services:
  - type: web
    name: qyverixai
    env: docker
    # Using Dockerfile so OS packages (libmagic) are included during build
    # Render will build the repository Dockerfile; no separate buildCommand needed
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RATE_LIMIT_PER_MINUTE
        value: 30
      - key: LLM_ENABLED
        value: false
    staticPublishPath: frontend
    routes:
      - type: rewrite
        source: /app
        destination: /frontend/index.html